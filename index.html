<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Cenicienta de Bucaramanga</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="intro-overlay" class="overlay flex-column">
    <img src="img/30.png" alt="Logo" id="intro-logo">
    <div id="welcome-content" class="intro-box">
      <h2>The Cinderella of Bucaramanga</h2>
      <div class="instructions">
        <h3>HOW TO PLAY</h3>
        <p>🎴 <b>FLIP:</b> Click a card to reveal a memory.</p>
        <p>✨ <b>MATCH:</b> Find the pair to clear the board.</p>
        <p>🏆 <b>WIN:</b> Complete the full grid to celebrate!</p>
      </div>
      <p>Preparing the magic in: <b id="count-num">5</b></p>
    </div>
  </div>

  <div class="game-header">
    <h1>The Cinderella of Bucaramanga</h1>
    <div class="stats-container">
      <span>Moves: <b id="move-counter">0</b></span>
      
      <div class="audio-controls">
        <button id="mute-btn" class="btn-audio" onclick="toggleMute()">🔊</button>
        <div class="volume-group">
          <label>Vol:</label>
          <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume(this.value)">
        </div>
      </div>

      <button class="btn-orange" onclick="resetGame()">New Game</button>
    </div>
  </div>

  <div id="win-modal" class="overlay" style="display: none;">
    <div class="message-content win-card">
      <h2>¡Felicidades!</h2>
      <p>The memories are complete.</p>
      <button class="btn-orange" onclick="resetGame()">Play Again</button>
    </div>
  </div>

  <section class="memory-game" id="game-board"></section>

  <audio id="bg-music" src="audio/bg_music.mp3" loop></audio>
  <audio id="sound-flip" src="audio/flip.mp3"></audio>
  <audio id="sound-match" src="audio/match.mp3"></audio>
  <audio id="sound-mismatch" src="audio/mismatch.mp3"></audio>

  <script src="scripts.js"></script>
</body>
</html>
