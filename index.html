<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Cenicienta de Bucaramanga</title>
  <link rel="stylesheet" href="style.css?v=3.2">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="intro-overlay" class="overlay flex-column">
    <img src="img/30.png" alt="Logo" id="intro-logo">
    
    <div id="welcome-content" class="intro-box">
      <h2 class="welcome-title">The Cinderella of Bucaramanga</h2>
      <p class="welcome-p">A magical journey through heritage and dance.</p>
      <div class="promo-links">
        <p>Learn more at: <a href="https://salsarichmond.com" target="_blank">salsarichmond.com</a></p>
      </div>
    </div>

    <div id="countdown-display">
      Preparing the magic in: <br>
      <b id="count-num">5</b>
    </div>
  </div>

  <div class="game-header">
    <h1>The Cinderella of Bucaramanga</h1>
    <div class="stats-container">
      <span>Time: <b id="timer">00:00</b></span>
      <span>Moves: <b id="move-counter">0</b></span>
      <button class="btn-orange" onclick="location.reload()">New Game</button>
    </div>
  </div>

  <div id="win-modal" class="overlay" style="display: none;">
    <div class="message-content win-card">
      <h2>¡Felicidades!</h2>
      <p>The memories are complete.</p>
      <button class="btn-orange" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <section class="memory-game" id="game-board"></section>

  <audio id="bg-music" src="audio/bg_music.mp3" loop></audio>
  <audio id="sound-flip" src="audio/flip.mp3"></audio>
  <audio id="sound-match" src="audio/match.mp3"></audio>
  <audio id="sound-mismatch" src="audio/mismatch.mp3"></audio>

  <script src="scripts.js"></script>
</body>
</html>
